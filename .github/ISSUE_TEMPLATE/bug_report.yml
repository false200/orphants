---
name: Bug report
about: Report a problem with orphants
title: "[bug] "
labels: bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: orphants version
  - type: input
    id: node
    attributes:
      label: Node.js version
